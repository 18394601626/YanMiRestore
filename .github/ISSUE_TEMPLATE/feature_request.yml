name: Feature Request
description: 提交一个功能建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出功能建议。请说明场景、收益和可选方案。
  - type: textarea
    id: background
    attributes:
      label: 背景与问题
      description: 当前使用过程中遇到的限制
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述你期望的行为、命令或配置方式
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他实现方式（可选）
  - type: textarea
    id: impact
    attributes:
      label: 影响评估
      description: 兼容性、性能、风险或维护成本
  - type: checkboxes
    id: checks
    attributes:
      label: 检查清单
      options:
        - label: 我已阅读 README 与已有 Issue
          required: true
        - label: 该需求不包含违法用途或绕过授权能力
          required: true
